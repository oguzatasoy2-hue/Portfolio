<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Dashboard Demo</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#EAC54F',
                        background: '#09090B',
                        surface: 'rgba(255, 255, 255, 0.02)',
                        borderLight: 'rgba(255, 255, 255, 0.08)'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #09090B;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 1rem;
            /* Less padding since it's an iframe */
        }

        .bento-card {
            background: var(--surface);
            border: 1px solid var(--borderLight);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bento-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.04);
        }

        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        /* SVG Glow equivalent for ChartJS Canvas */
        #chartContainer {
            position: relative;
            height: 300px;
            width: 100%;
            margin-top: 1rem;
        }

        /* We apply drop-shadow to the canvas but it affects all lines. 
           To glow only the primary line, we'll use a hack or just accept a subtle canvas glow. 
           Actually, Chart.js allows custom drawing or we can just apply a faint drop-shadow. */
        canvas#yieldChart {
            filter: drop-shadow(0px 4px 6px rgba(234, 197, 79, 0.15));
        }

        /* Tooltip styling handled by Chart.js HTML tooltip if needed, but default dark is okay */
    </style>
</head>

<body class="selection:bg-[#EAC54F]/30 selection:text-white">

    <div class="max-w-4xl mx-auto space-y-6">

        <!-- Header -->
        <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
                <div class="p-1.5 rounded-md bg-white/[0.03] border border-white/[0.08]">
                    <!-- Target Icon SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="#EAC54F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="6"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                    </svg>
                </div>
                <h1 class="text-xl font-semibold tracking-[-0.02em] text-white">Yield & Positioning <span
                        class="text-xs ml-2 bg-white/10 px-2 py-0.5 rounded text-zinc-400">Live Demo</span></h1>
            </div>
        </div>

        <!-- KPIs Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bento-card group">
                <p class="text-zinc-400 text-[10px] uppercase tracking-[0.05em] font-medium mb-1">Notre ADR</p>
                <p class="text-3xl font-semibold text-white tabular-nums tracking-tight">154 €</p>
            </div>
            <div class="bento-card group">
                <p class="text-zinc-400 text-[10px] uppercase tracking-[0.05em] font-medium mb-1">Marché Median
                    (CompSet)</p>
                <p class="text-3xl font-semibold text-white tabular-nums tracking-tight">141 €</p>
            </div>
        </div>

        <!-- Chart -->
        <div id="chartContainer">
            <canvas id="yieldChart"></canvas>
        </div>

    </div>

    <script>
        const ctx = document.getElementById('yieldChart').getContext('2d');

        const data = {
            labels: ['01 Mar', '02 Mar', '03 Mar', '04 Mar', '05 Mar', '06 Mar', '07 Mar'],
            datasets: [
                {
                    label: 'CompSet',
                    data: [140, 142, 141, 141, 143, 145, 148],
                    borderColor: '#71717A',
                    borderWidth: 2,
                    borderDash: [4, 4],
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointBackgroundColor: '#71717A',
                    pointBorderColor: '#09090B',
                    pointBorderWidth: 2,
                    tension: 0.4
                },
                {
                    label: 'Notre Hôtel',
                    data: [135, 138, 145, 154, 150, 148, 152],
                    borderColor: '#EAC54F',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#EAC54F',
                    pointBorderColor: '#09090B',
                    pointBorderWidth: 2,
                    tension: 0.4
                }
            ]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        display: false // We don't need top legend, it's clear from tooltip
                    },
                    tooltip: {
                        backgroundColor: '#09090B',
                        titleColor: '#A1A1AA',
                        titleFont: { family: 'Inter', size: 10, weight: '500' },
                        bodyColor: '#ffffff',
                        bodyFont: { family: 'Inter', size: 12 },
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 8,
                        boxPadding: 6,
                        usePointStyle: true,
                        callbacks: {
                            label: function (context) {
                                return context.dataset.label + ': ' + context.parsed.y + ' €';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false,
                            drawBorder: false
                        },
                        ticks: {
                            color: '#A1A1AA',
                            font: { family: 'Inter', size: 10, weight: '500' },
                            padding: 10
                        },
                        border: { display: false }
                    },
                    y: {
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)',
                            drawBorder: false,
                            borderDash: [4, 4]
                        },
                        ticks: {
                            color: '#A1A1AA',
                            font: { family: 'Inter', size: 10, weight: '500' },
                            padding: 10,
                            callback: function (value) {
                                return value + ' €';
                            }
                        },
                        border: { display: false }
                    }
                }
            }
        };

        new Chart(ctx, config);
    </script>
</body>

</html>
